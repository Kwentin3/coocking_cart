services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coocking-cart-app
    restart: unless-stopped
    env_file:
      - /opt/coocking-cart/runtime/.env
    environment:
      APP_BASE_URL: https://coocking-cart.speechbattle.com
      PUBLIC_DOMAIN: coocking-cart.speechbattle.com
      SQLITE_DB_PATH: /app/data/demo.sqlite
      CONTEXT_MANIFEST_PATH: /app/docs/mvp/context/context_manifest.yml
      CONTEXT_LAYERS_DIR: /app/docs/mvp/context
    volumes:
      - /opt/coocking-cart/data:/app/data
    networks:
      - edge
    labels:
      traefik.enable: "true"
      traefik.docker.network: edge
      traefik.http.middlewares.coocking-cart-https-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.coocking-cart-https-redirect.redirectscheme.permanent: "true"
      traefik.http.routers.coocking-cart-web.entrypoints: web
      traefik.http.routers.coocking-cart-web.middlewares: coocking-cart-https-redirect
      traefik.http.routers.coocking-cart-web.rule: Host(`coocking-cart.speechbattle.com`)
      traefik.http.routers.coocking-cart-websecure.entrypoints: websecure
      traefik.http.routers.coocking-cart-websecure.rule: Host(`coocking-cart.speechbattle.com`)
      traefik.http.routers.coocking-cart-websecure.service: coocking-cart-svc
      traefik.http.routers.coocking-cart-websecure.tls: "true"
      traefik.http.routers.coocking-cart-websecure.tls.certresolver: le
      traefik.http.services.coocking-cart-svc.loadbalancer.server.port: "8000"

networks:
  edge:
    external: true
