<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coocking Cart Demo MVP</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sessionsDrawerBtn" class="icon-btn topbar-menu-btn hidden" type="button" title="Открыть чаты" aria-label="Открыть чаты" aria-expanded="false">☰</button>
          <div class="brand-lockup">
            <strong>Coocking Cart</strong>
            <span class="muted">Demo MVP</span>
          </div>
          <div id="currentChatTitle" class="current-chat-title hidden">Чат</div>
        </div>
        <div class="topbar-actions">
          <button id="artifactTopBtn" class="icon-btn artifact-top-btn hidden" type="button" title="Открыть результат" aria-label="Открыть результат" aria-expanded="false">
            ▤
            <span id="artifactTopBadge" class="artifact-dot hidden" aria-hidden="true"></span>
          </button>
          <button id="avatarBtn" class="avatar-btn hidden" type="button" title="Системное меню" aria-label="Системное меню" aria-haspopup="true" aria-expanded="false">?</button>
          <div id="systemMenu" class="system-menu hidden" role="menu" aria-label="Системное меню">
            <div class="system-menu-role">
              <span class="muted">Роль</span>
              <span id="roleBadge" class="badge">guest</span>
            </div>
            <button id="newSessionBtn" class="system-menu-item" type="button" role="menuitem">Новый чат</button>
            <button id="logoutBtn" class="system-menu-item" type="button" role="menuitem">Выйти</button>
          </div>
        </div>
      </header>

      <main id="loginView" class="login-view">
        <section class="login-card">
          <h1>Вход в демо</h1>
          <div id="configErrors" class="warning-list hidden"></div>
          <form id="loginForm" class="stack">
            <input id="emailInput" type="email" placeholder="Email admin" autocomplete="username" />
            <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password" />
            <button type="submit">Войти как admin</button>
          </form>
          <button id="demoLoginBtn" class="secondary">Войти как demo user</button>
        </section>
      </main>

      <main id="workspace" class="workspace hidden">
        <button id="sessionsScrim" class="surface-scrim sessions-scrim hidden" type="button" aria-label="Закрыть список чатов"></button>

        <aside id="sessionsPanel" class="sessions-panel" aria-label="Чаты">
          <div class="panel-title-row">
            <div id="railTitle" class="panel-title">Сессии</div>
            <button id="newSessionRailBtn" class="icon-btn compact-icon" title="Новый чат" aria-label="Новый чат">＋</button>
          </div>
          <div id="sessionsList" class="sessions-list"></div>
        </aside>

        <section class="chat-panel">
          <div id="chatColumn" class="chat-column" aria-label="Диалог с ассистентом">
            <div class="quick-actions">
              <button data-demo="Хочу технологическую карту для курицы по-вьетнамски">Курица по-вьетнамски</button>
              <button data-demo="Хочу технологическую карту яичницы или омлета">Яичница/омлет</button>
            </div>
            <div id="messages" class="messages empty-state">Создайте или выберите сессию.</div>
            <button id="artifactSummary" class="artifact-summary hidden" type="button" aria-label="Открыть результат текущего чата"></button>
            <form id="messageForm" class="message-form">
              <div class="message-input-stack">
                <textarea id="messageInput" rows="2" placeholder="Опишите блюдо или уточнение"></textarea>
                <div id="voiceStatus" class="voice-status hidden" role="status" aria-live="polite"></div>
              </div>
              <div class="message-actions">
                <button id="voiceBtn" class="icon-btn voice-btn" type="button" title="Голосовой ввод" aria-label="Начать голосовой ввод">◉</button>
                <button id="voiceCancelBtn" class="icon-btn compact-icon voice-cancel-btn hidden" type="button" title="Отменить запись" aria-label="Отменить запись">×</button>
                <button id="sendBtn" class="icon-btn send-btn" type="submit" title="Отправить" aria-label="Отправить">➤</button>
              </div>
            </form>
          </div>
          <section id="adminWorkspace" class="admin-workspace hidden" aria-label="Служебный экран admin"></section>
        </section>

        <button id="artifactScrim" class="surface-scrim artifact-scrim hidden" type="button" aria-label="Закрыть результат"></button>

        <aside id="resultPanel" class="result-panel" aria-label="Результат текущего чата">
          <div class="artifact-panel-header">
            <div>
              <strong>Результат</strong>
              <span id="artifactPanelSubtitle" class="muted">Текущий чат</span>
            </div>
            <button id="artifactCloseBtn" class="icon-btn compact-icon" type="button" title="Закрыть результат" aria-label="Закрыть результат">×</button>
          </div>
          <nav class="tabs" aria-label="Результат">
            <button class="tab active" data-tab="draft">Проект</button>
            <button class="tab" data-tab="warnings">Риски</button>
            <button class="tab" data-tab="json">JSON</button>
            <button id="inspectorTab" class="tab hidden" data-tab="inspector">Trace</button>
            <button id="usersTab" class="tab hidden" data-tab="users">Пользователи</button>
          </nav>

          <section id="draftTab" class="tab-content"></section>
          <section id="warningsTab" class="tab-content hidden"></section>
          <section id="jsonTab" class="tab-content hidden"></section>
          <section id="inspectorPanel" class="tab-content hidden"></section>
          <section id="usersPanel" class="tab-content hidden"></section>
        </aside>
      </main>

      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    </div>
    <script src="/static/vendor/markdown-it.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
